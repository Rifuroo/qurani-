name: cuda_qurani
description: "A new Flutter project."
publish_to: 'none'

version: 0.1.0

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  flutter_dotenv: ^6.0.0

  flutter_localization: ^0.3.3
  # UI Needs
  font_awesome_flutter: ^10.12.0

  # Image compressor
  flutter_image_compress: ^2.4.0

  # Google Login/Register
  google_sign_in: ^6.2.1

  # Time, Dates, Year
  intl: ^0.20.2

  # Chart
  fl_chart: ^1.1.1
  
  # Audio Recording (REQUIRED for AudioService)
  record: ^6.1.2
  permission_handler: ^12.0.1
    # ffmpeg_kit_flutter_new: ^4.1.0

  # Audio player & controller for listening
  just_audio: ^0.10.5
  
  # WebSocket & HTTP
  web_socket_channel: ^3.0.1
  http: ^1.2.2
  
  # State Management
  provider: ^6.1.2
  shared_preferences: ^2.5.3
  
  # In-App Purchase
  in_app_purchase: ^3.2.0
  
  # Audio Processing
  path_provider: ^2.1.4
  
  # Database
  sqflite: ^2.3.0
  path: ^1.8.3
  sqflite_common_ffi: ^2.3.6
  supabase: ^2.10.0
  supabase_flutter: ^2.10.3 
  
  # Home Widget
  home_widget: ^0.8.1
  workmanager: ^0.9.0

  dio: ^5.9.0
  restart_app: ^1.3.2
  
  # Notifications
  flutter_local_notifications: ^18.0.1
  firebase_core: any
  firebase_messaging: any

  # change app package name
  change_app_package_name: ^1.1.0

  # change app name
  rename_app: ^1.6.1
  flutter_secure_storage: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Icon App
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  image_path: "assets/icon/icon_app.jpg"

  android: true
  ios: true
  remove_alpha_ios: true

  web:
    generate: true
    image_path: "assets/icon/icon_app.jpg"
    background_color: "#ffffff"
    theme_color: "#ffffff"

  windows:
    generate: true
    image_path: "assets/icon/icon_app.jpg"

  macos:
    generate: true
    image_path: "assets/icon/icon_app.jpg"

dependency_overrides:
  vector_math: ^2.2.0

flutter:
  uses-material-design: true

  assets:
    - assets/lang/
    - assets/lang/data/
    - assets/lang/data/language.json
    - assets/lang/ar/
    - assets/lang/ar/home/
    - assets/lang/ar/profile/
